profiles:
  - profile_id: P1_payments
    text: >
      (менеджер OR консультант OR специалист) AND (обнал* OR "серые схемы" OR "платёжный агент" OR "переводы на карту")
    why: >
      Поиск ролей, потенциально вовлеченных в незаконные платежные схемы и обналичивание.
      Фокус на "серых" методах расчетов.
    expected_risk_category: payments
    enabled: true

  - profile_id: P2_crypto
    text: >
      (оператор OR администратор OR трейдер) AND (крипто* OR p2p OR обменник OR "арбитраж")
    why: >
      Выявление нелицензированных финансовых посредников, работающих с криптоактивами
      вне правового поля.
    expected_risk_category: crypto
    enabled: true

  - profile_id: P3_gambling
    text: >
      (оператор OR саппорт OR менеджер) AND (казино OR гемблинг OR betting OR "букмекер" OR "ставки")
    why: >
      Мониторинг найма в секторе азартных игр, который является зоной повышенного
      внимания для ПОД/ФТ.
    expected_risk_category: gambling
    enabled: true

  - profile_id: P4_grey_schemes
    text: >
      (курьер OR водитель OR регистратор) AND (наличные OR "на карту" OR "без договора" OR "номинал")
    why: >
      Поиск признаков неофициальной занятости и подбора "дропов" для финансовых махинаций.
    expected_risk_category: grey_schemes
    enabled: true

  - profile_id: P5_scam_baits
    text: >
      (менеджер OR помощник) AND ("быстрый заработок" OR "без опыта" OR "легкие деньги" OR "выплаты ежедневно")
    why: >
      Выявление вакансий-приманок, характерных для вовлечения людей в мошеннические проекты.
    expected_risk_category: scam
    enabled: true